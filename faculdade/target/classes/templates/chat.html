<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chatbot Estoque</title>

    <style>

        body {
            background: #111827;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
        }

        .chat {
            width: 700px;
            max-width: 95%;
            margin: 40px auto;
            background: #1f2937;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        #mensagens {
            height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .msg {
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #374151;
            margin-right: auto;
            text-align: left;
        }

        .nome {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .area-input {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

    </style>
</head>

<body>

<div class="chat">

    <h1>Chatbot de Estoque</h1>

    <div id="mensagens"></div>

    <div class="area-input">
        <input type="text" id="texto" placeholder="Digite sua mensagem">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script>

    async function enviar() {

        const input = document.getElementById("texto");
        const texto = input.value.trim();

        if (!texto) return;

        adicionarMensagem("Você", texto, "user");

        input.value = "";

        try {

            const resposta = await fetch("/mensagem", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "texto=" + encodeURIComponent(texto)
            });

            const mensagem = await resposta.text();

            adicionarMensagem("Bot", mensagem, "bot");

        } catch (erro) {

            adicionarMensagem("Bot", "Erro ao conectar com o servidor.", "bot");

        }
    }

    function adicionarMensagem(nome, texto, tipo) {

        const div = document.createElement("div");

        div.className = "msg " + tipo;

        div.innerHTML = `
        <div class="nome">${nome}</div>
        <div>${texto}</div>
    `;

        const mensagens = document.getElementById("mensagens");

        mensagens.appendChild(div);

        mensagens.scrollTop = mensagens.scrollHeight;
    }

    document.getElementById("texto").addEventListener("keypress", function(event) {

        if (event.key === "Enter") {
            enviar();
        }

    });

</script>

</body>
</html>
